spring.application.name=FitnessAIBot

# Конфигурация через .env (или системные переменные окружения).
spring.config.import=optional:file:.env[.properties],optional:file:./config/logging.properties

# ===== Telegram =====
fitness.bot.enabled=${FITNESS_BOT_ENABLED:true}
fitness.bot.username=${FITNESS_BOT_USERNAME:FitnessAIBot}
fitness.bot.token=${FITNESS_BOT_TOKEN:}
fitness.bot.url=${FITNESS_BOT_URL:}
fitness.bot.streamReplyEnabled=${FITNESS_BOT_STREAM_REPLY_ENABLED:false}

# ===== Spring AI (любой OpenAI-совместимый провайдер) =====
# Настройки читаются напрямую автоконфигурацией Spring AI.
# ВАЖНО: НЕ добавляйте /v1 в конце — Spring AI 2.0.0-M2 добавляет "/v1/chat/completions" автоматически
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.chat.temperature=${OPENAI_TEMPERATURE:0.2}

# ===== PostgreSQL =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fitnessaibot}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===== Google Health API =====
google.health.client-id=${GOOGLE_HEALTH_CLIENT_ID:}
google.health.client-secret=${GOOGLE_HEALTH_CLIENT_SECRET:}
google.health.redirect-uri=${GOOGLE_HEALTH_REDIRECT_URI:http://localhost:8080/google-health/oauth/callback}
google.health.lookback-days=${GOOGLE_HEALTH_LOOKBACK_DAYS:7}

# ===== Logging =====
logging.level.org.springframework.ai=ERROR
logging.level.ru.yourass.fitnessaibot=ERROR
